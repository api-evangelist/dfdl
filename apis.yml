aid: dfdl
name: DFDL
description: >-
  Data Format Description Language (DFDL) is an open standard for describing
  data formats used in binary and text files and data streams. DFDL is used to
  describe the format of existing data so that it can be parsed or unparsed
  (generated) using a DFDL processor, enabling integration with legacy and
  modern data systems. DFDL was developed by the Open Grid Forum (OGF) and is
  also published as ISO/IEC 23415:2004. Apache Daffodil is the reference
  open-source implementation, with the latest release being version 4.1.0.
